apiVersion: karpenter.sh/v1beta1
kind: NodePool
metadata:
  name: ${cluster_name}-i4i-nodepool
spec:
  # Template for i4i instances with NVMe storage
  template:
    metadata:
      labels:
        node-type: "i4i-nvme"
        workload: "unreal-cloud-ddc"
    spec:
      # Instance requirements for i4i family
      requirements:
        - key: karpenter.sh/capacity-type
          operator: In
          values: ["on-demand", "spot"]
        - key: kubernetes.io/arch
          operator: In
          values: ["amd64"]
        - key: node.kubernetes.io/instance-type
          operator: In
          values: ["i4i.large", "i4i.xlarge", "i4i.2xlarge", "i4i.4xlarge", "i4i.8xlarge"]
      
      # Node class reference
      nodeClassRef:
        apiVersion: karpenter.k8s.aws/v1beta1
        kind: EC2NodeClass
        name: ${cluster_name}-i4i-nodeclass
      
      # Taints for DDC workloads (optional)
      taints:
        - key: "workload"
          value: "unreal-cloud-ddc"
          effect: "NoSchedule"
  
  # Scaling limits
  limits:
    cpu: 1000
    memory: 1000Gi
  
  # Disruption settings
  disruption:
    consolidationPolicy: WhenEmpty
    consolidateAfter: 30s
    expireAfter: 30m

---
apiVersion: karpenter.k8s.aws/v1beta1
kind: EC2NodeClass
metadata:
  name: ${cluster_name}-i4i-nodeclass
spec:
  # AMI selection
  amiFamily: AL2
  
  # Instance profile (will be created by Terraform)
  instanceProfile: ${instance_profile_name}
  
  # Security groups
  securityGroupSelectorTerms:
    - tags:
        "aws:eks:cluster-name": "${cluster_name}"
  
  # Subnet selection
  subnetSelectorTerms:
    - tags:
        "karpenter.sh/discovery": "${cluster_name}"
  
  # Instance store configuration for NVMe
  instanceStorePolicy: "RAID0"
  
  # User data for NVMe setup
  userData: |
    #!/bin/bash
    /etc/eks/bootstrap.sh ${cluster_name}
    
    # Format and mount NVMe drives for DDC cache
    if lsblk | grep -q nvme; then
      echo "Setting up NVMe storage for DDC cache..."
      
      # Create mount point
      mkdir -p /mnt/ddc-cache
      
      # Format first NVMe device (i4i instances have NVMe)
      NVME_DEVICE=$(lsblk -d -o NAME | grep nvme | head -1)
      if [ ! -z "$NVME_DEVICE" ]; then
        mkfs.ext4 /dev/$NVME_DEVICE
        mount /dev/$NVME_DEVICE /mnt/ddc-cache
        chmod 777 /mnt/ddc-cache
        
        # Add to fstab for persistence
        echo "/dev/$NVME_DEVICE /mnt/ddc-cache ext4 defaults 0 2" >> /etc/fstab
        
        echo "NVMe storage configured at /mnt/ddc-cache"
      fi
    fi
  
  # Tags
  tags:
    Name: "${cluster_name}-i4i-node"
    "karpenter.sh/discovery": "${cluster_name}"
    NodeType: "i4i-nvme"
    Workload: "unreal-cloud-ddc"

---
apiVersion: karpenter.sh/v1beta1
kind: NodePool
metadata:
  name: ${cluster_name}-general-nodepool
spec:
  # Template for general workloads (system pods, etc.)
  template:
    metadata:
      labels:
        node-type: "general"
        workload: "system"
    spec:
      # Instance requirements for general workloads
      requirements:
        - key: karpenter.sh/capacity-type
          operator: In
          values: ["on-demand", "spot"]
        - key: kubernetes.io/arch
          operator: In
          values: ["amd64"]
        - key: node.kubernetes.io/instance-type
          operator: In
          values: ["m5.large", "m5.xlarge", "m5.2xlarge", "c5.large", "c5.xlarge"]
      
      # Node class reference
      nodeClassRef:
        apiVersion: karpenter.k8s.aws/v1beta1
        kind: EC2NodeClass
        name: ${cluster_name}-general-nodeclass
  
  # Scaling limits
  limits:
    cpu: 100
    memory: 100Gi
  
  # Disruption settings
  disruption:
    consolidationPolicy: WhenEmpty
    consolidateAfter: 30s
    expireAfter: 30m

---
apiVersion: karpenter.k8s.aws/v1beta1
kind: EC2NodeClass
metadata:
  name: ${cluster_name}-general-nodeclass
spec:
  # AMI selection
  amiFamily: AL2
  
  # Instance profile
  instanceProfile: ${instance_profile_name}
  
  # Security groups
  securityGroupSelectorTerms:
    - tags:
        "aws:eks:cluster-name": "${cluster_name}"
  
  # Subnet selection
  subnetSelectorTerms:
    - tags:
        "karpenter.sh/discovery": "${cluster_name}"
  
  # User data
  userData: |
    #!/bin/bash
    /etc/eks/bootstrap.sh ${cluster_name}
  
  # Tags
  tags:
    Name: "${cluster_name}-general-node"
    "karpenter.sh/discovery": "${cluster_name}"
    NodeType: "general"
    Workload: "system"