version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    commit-message:
      prefix: "chore"
      include: "scope"
    schedule:
      interval: "monthly"
    groups:
      actions-minor-patch:
        applies-to: version-updates
        update-types:
          - "minor"
          - "patch"

  - package-ecosystem: "terraform"
    directory: "/"
    commit-message:
      prefix: "chore"
      include: "scope"
    groups:
      aws-provider:
        applies-to: version-updates
        patterns:
          - "hashicorp/aws"
      awscc-provider:
        applies-to: version-updates
        patterns:
          - "hashicorp/awscc"
      random-provider:
        applies-to: version-updates
        patterns:
          - "hashicorp/random"
    schedule:
      interval: "monthly"

  - package-ecosystem: "docker"
    directory: "/docs"
    commit-message:
      prefix: "chore"
      include: "scope"
    schedule:
      interval: "monthly"

  - package-ecosystem: "pip"
    directory: "/docs"
    commit-message:
      prefix: "chore"
      include: "scope"
    schedule:
      interval: "monthly"
    groups:
      docs-dependencies:
        applies-to: version-updates
        patterns:
          - "*"
