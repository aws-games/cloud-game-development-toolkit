name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+*"

permissions:
  contents: read

jobs:
  release:
    name: Release
    if: github.repository == 'aws-games/cloud-game-development-toolkit'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          token: ${{ secrets.BOT_PAT }}

      - name: Validate tag is on main
        run: |
          TAG_COMMIT=$(git rev-list -n 1 "$GITHUB_REF_NAME")
          if ! git merge-base --is-ancestor "$TAG_COMMIT" origin/main; then
            echo "::error::Tag $GITHUB_REF_NAME does not point to a commit on main"
            exit 1
          fi

      - name: Verify draft release exists
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DRAFT_COUNT=$(gh api repos/${{ github.repository }}/releases \
            --jq '[.[] | select(.draft == true)] | length')
          if [ "$DRAFT_COUNT" -eq 0 ]; then
            echo "::error::No draft release found. Merge PRs first so release-drafter creates a draft."
            exit 1
          fi

      - name: Configure git
        run: |
          git config user.name "cloud-game-development-toolkit-bot"
          git config user.email "cloud-game-development-toolkit-bot@users.noreply.github.com"

      - name: Generate changelog
        run: |
          docker run --rm -v "$(pwd)":/workdir quay.io/git-chglog/git-chglog -o CHANGELOG.md

      - name: Commit changelog
        run: |
          git add CHANGELOG.md
          if git diff --cached --quiet; then
            echo "No changelog changes to commit"
          else
            git commit -m "chore: regenerate changelog for $GITHUB_REF_NAME [skip ci]"
            git push origin HEAD:main
          fi

      - name: Move tags to include changelog commit
        run: |
          git tag -f "$GITHUB_REF_NAME"
          git push -f origin "$GITHUB_REF_NAME"
          git tag -f latest
          git push -f origin latest

      - name: Publish release
        env:
          GH_TOKEN: ${{ secrets.BOT_PAT }}
        run: |
          DRAFT_ID=$(gh api repos/${{ github.repository }}/releases \
            --jq '.[] | select(.draft == true) | .id' | head -1)
          gh api --method PATCH "repos/${{ github.repository }}/releases/$DRAFT_ID" \
            --field tag_name="$GITHUB_REF_NAME" \
            --field name="$GITHUB_REF_NAME" \
            --field draft=false \
            --field make_latest=true
